<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="projects.css" />
	<link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Digital Marketing</title>
  </head>
  <body>
    <section class="Text-slider">
      <div class="ticker-wrapper">
        <!-- Text-slider -->
        <div class="ticker-outer">
          <div class="ticker-track" id="tickerTrack">
            <!--
          Two identical .ticker-segment copies sit side-by-side.
          The animation scrolls the belt leftward by exactly 50%
          (one copy's width), then loops creating a seamless repeat.
          Which builds both copies so a single source of truth array
          drives the content.
        -->
            <div class="ticker-content" class="tickerContent"></div>
          </div>
        </div>
      </div>
    </section>
    <section class="box">
      <div class="work">
        <p class="logo-Text">
          <img src="./assets/Untitled25_20260316201052.png" alt="logo" id="logo" />Our Work
          Proccess
        </p>
        <div class="top">
          <h1>Step-by-Step to Your Growth</h1>
          <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Placeat,
            odit quibusdam dolor asperiores fugiat rem tenetur dolore vitae,
            dolores earum ad at
          </p>
        </div>

        <div class="team-container" id="teamContainer">
          <!-- JS will render cards here -->
        </div>
      </div>
    </section>
    <section class="Text-slider">
      <div class="ticker-wrapper">
        <!-- Text-slider -->
        <div class="ticker-outer">
          <div class="ticker-track" id="tickerTrack">
            <!--
          Two identical .ticker-segment copies sit side-by-side.
          The animation scrolls the belt leftward by exactly 50%
          (one copy's width), then loops creating a seamless repeat.
          Which builds both copies so a single source of truth array
          drives the content.
        -->
            <div class="ticker-content" class="tickerContent"></div>
          </div>
        </div>
      </div>
    </section>
    <section class="second">
      <p class="logo-Text">
        <img src="./assets/Untitled25_20260316201052.png" alt="logo" id="logo" />Our Work
      </p>
      <h1>Work That Drives Results</h1>
      <div class="work-container" id="workContainer">
        <!-- JS will render cards here -->
      </div>
      <button class="buttons">View All Work</button>
    </section>
    <script src="./projects.js"></script>
  </body>
</html>
